<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Biometrik Tasdiqlash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080b12;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --border-glow: rgba(99,179,237,0.35);
    --blue: #63b3ed;
    --blue-deep: #3a8fd4;
    --green: #48bb78;
    --green-glow: rgba(72,187,120,0.4);
    --red: #fc8181;
    --red-glow: rgba(252,129,129,0.4);
    --text-primary: #f0f4f8;
    --text-secondary: rgba(255,255,255,0.45);
    --text-muted: rgba(255,255,255,0.25);
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--bg);
  }

  body {
    font-family: var(--font-body);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    position: relative;
  }

  /* ── Atmospheric background ── */
  .bg-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .bg-orb {
    position: absolute; border-radius: 50%;
    filter: blur(80px); opacity: 0.18;
    animation: drift 18s ease-in-out infinite alternate;
  }
  .bg-orb.a {
    width: 420px; height: 420px;
    background: radial-gradient(circle, #1a5276, transparent);
    top: -100px; left: -80px;
    animation-duration: 20s;
  }
  .bg-orb.b {
    width: 340px; height: 340px;
    background: radial-gradient(circle, #0e3460, transparent);
    bottom: -60px; right: -60px;
    animation-duration: 15s; animation-delay: -7s;
  }
  .bg-orb.c {
    width: 220px; height: 220px;
    background: radial-gradient(circle, #1e8449, transparent);
    bottom: 30%; left: -40px; opacity: 0.10;
    animation-duration: 25s; animation-delay: -3s;
  }
  .bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(99,179,237,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,179,237,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .bg-noise {
    position: absolute; inset: 0; opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(30px, 20px) scale(1.08); }
  }

  /* ── Main card ── */
  .card {
    position: relative; z-index: 10;
    width: min(88vw, 360px);
    background: linear-gradient(145deg, rgba(255,255,255,0.065), rgba(255,255,255,0.025));
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 40px 32px 36px;
    backdrop-filter: blur(28px) saturate(1.4);
    -webkit-backdrop-filter: blur(28px) saturate(1.4);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04) inset,
      0 32px 64px rgba(0,0,0,0.55),
      0 8px 24px rgba(0,0,0,0.35);
    animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(28px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── Header row ── */
  .header-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px;
  }
  .logo-mark {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--blue-deep), var(--blue));
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 12px rgba(99,179,237,0.3);
  }
  .logo-mark svg { width: 18px; height: 18px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; }
  .session-badge {
    font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
    color: var(--text-muted);
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
  }

  /* ── Fingerprint ring ── */
  .fp-ring-wrap {
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 30px;
    position: relative;
  }
  .fp-ring {
    position: relative;
    width: 120px; height: 120px;
    display: flex; align-items: center; justify-content: center;
  }
  .fp-ring svg.ring-svg {
    position: absolute; inset: 0; width: 100%; height: 100%;
    transform: rotate(-90deg);
  }
  .fp-ring circle.track {
    fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 1.5;
  }
  .fp-ring circle.progress {
    fill: none; stroke: var(--blue); stroke-width: 1.5;
    stroke-linecap: round;
    stroke-dasharray: 339;
    stroke-dashoffset: 339;
    transition: stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  .fp-icon-btn {
    position: relative; z-index: 2;
    width: 80px; height: 80px; border-radius: 50%;
    background: linear-gradient(145deg, rgba(255,255,255,0.09), rgba(255,255,255,0.03));
    border: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    box-shadow:
      0 0 0 8px rgba(99,179,237,0.04),
      0 8px 28px rgba(0,0,0,0.4);
    transition: transform 0.2s ease, box-shadow 0.3s ease;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .fp-icon-btn svg {
    width: 38px; height: 38px;
    stroke: var(--blue);
    transition: stroke 0.3s ease;
    filter: drop-shadow(0 0 8px rgba(99,179,237,0.45));
  }

  /* scanning animation */
  @keyframes scanPulse {
    0%, 100% { box-shadow: 0 0 0 8px rgba(99,179,237,0.04), 0 8px 28px rgba(0,0,0,0.4), 0 0 0 0 rgba(99,179,237,0.2); }
    50%       { box-shadow: 0 0 0 8px rgba(99,179,237,0.08), 0 8px 28px rgba(0,0,0,0.4), 0 0 0 20px rgba(99,179,237,0); }
  }
  .scanning .fp-icon-btn {
    animation: scanPulse 1.5s ease-in-out infinite;
  }

  /* success */
  .success .fp-icon-btn {
    background: linear-gradient(145deg, rgba(72,187,120,0.18), rgba(72,187,120,0.06));
    border-color: rgba(72,187,120,0.35);
    box-shadow: 0 0 0 12px rgba(72,187,120,0.07), 0 8px 28px rgba(0,0,0,0.4);
  }
  .success .fp-icon-btn svg { stroke: var(--green); filter: drop-shadow(0 0 10px rgba(72,187,120,0.55)); }
  .success .fp-ring circle.progress { stroke: var(--green); }

  /* error */
  .error .fp-icon-btn {
    background: linear-gradient(145deg, rgba(252,129,129,0.18), rgba(252,129,129,0.06));
    border-color: rgba(252,129,129,0.35);
    box-shadow: 0 0 0 12px rgba(252,129,129,0.07), 0 8px 28px rgba(0,0,0,0.4);
  }
  .error .fp-icon-btn svg { stroke: var(--red); filter: drop-shadow(0 0 10px rgba(252,129,129,0.55)); }

  /* ── Scan line overlay ── */
  .scan-line {
    position: absolute; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(99,179,237,0.7), transparent);
    border-radius: 2px;
    top: 10%;
    opacity: 0;
    transition: opacity 0.3s;
    animation: none;
  }
  .scanning .scan-line {
    opacity: 1;
    animation: scanLine 1.8s ease-in-out infinite;
  }
  @keyframes scanLine {
    0%   { top: 10%; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { top: 90%; opacity: 0; }
  }

  /* ── Text ── */
  .card-title {
    font-family: var(--font-display);
    font-size: 17px; font-weight: 700;
    color: var(--text-primary);
    text-align: center;
    line-height: 1.35;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }
  .card-sub {
    font-size: 13px; font-weight: 400;
    color: var(--text-secondary);
    text-align: center;
    line-height: 1.55;
    margin-bottom: 28px;
  }

  /* ── Status message ── */
  .status-msg {
    min-height: 20px;
    font-size: 12.5px; font-weight: 500;
    text-align: center; letter-spacing: 0.01em;
    color: var(--text-muted);
    margin-bottom: 20px;
    transition: color 0.3s, opacity 0.3s;
    opacity: 0.8;
  }
  .status-msg.ok  { color: var(--green); opacity: 1; }
  .status-msg.err { color: var(--red);   opacity: 1; }
  .status-msg.scanning { color: var(--blue); opacity: 1; }

  /* ── Button ── */
  .btn-wrap { display: flex; justify-content: center; }

  .fp-btn {
    position: relative; overflow: hidden;
    display: inline-flex; align-items: center; gap: 10px;
    padding: 15px 28px;
    background: linear-gradient(135deg, #1e6fa8 0%, #2d8fd6 50%, #1a5f95 100%);
    border: none; border-radius: 16px;
    color: #fff; font-family: var(--font-body);
    font-size: 14.5px; font-weight: 600; letter-spacing: 0.01em;
    cursor: pointer; outline: none;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.15) inset,
      0 -1px 0 rgba(0,0,0,0.2) inset,
      0 6px 24px rgba(30,111,168,0.45),
      0 2px 8px rgba(0,0,0,0.35);
    transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
    width: 100%;
    justify-content: center;
  }
  .fp-btn::before {
    content: ''; position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.12), transparent);
    pointer-events: none;
  }
  .fp-btn::after {
    content: ''; position: absolute;
    width: 60px; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
    top: 0; left: -80px;
    transform: skewX(-20deg);
    transition: left 0.55s ease;
  }
  .fp-btn:hover::after { left: 110%; }
  .fp-btn:active { transform: scale(0.97); box-shadow: 0 2px 10px rgba(30,111,168,0.4); }
  .fp-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .fp-btn svg {
    width: 18px; height: 18px; flex-shrink: 0;
    fill: none; stroke: white; stroke-width: 2; stroke-linecap: round;
  }

  /* success btn */
  .fp-btn.done {
    background: linear-gradient(135deg, #1a6b3c, #27a257, #1a6b3c);
    box-shadow: 0 6px 24px rgba(39,162,87,0.45), 0 2px 8px rgba(0,0,0,0.35);
    pointer-events: none;
  }

  /* ── Divider ── */
  .divider {
    display: flex; align-items: center; gap: 10px;
    margin: 24px 0 18px;
  }
  .divider span { flex: 1; height: 1px; background: var(--border); }
  .divider label { font-size: 11px; color: var(--text-muted); white-space: nowrap; letter-spacing: 0.05em; }

  /* ── Info row ── */
  .info-row {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    font-size: 11.5px; color: var(--text-muted);
  }
  .info-row svg { width: 13px; height: 13px; stroke: var(--text-muted); fill: none; stroke-width: 2; flex-shrink: 0; }

  /* ── Checkmark animation ── */
  @keyframes drawCheck {
    from { stroke-dashoffset: 30; }
    to   { stroke-dashoffset: 0; }
  }
  .check-path {
    stroke-dasharray: 30;
    stroke-dashoffset: 30;
  }
  .success .check-path {
    animation: drawCheck 0.45s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
  }

  /* ── Ripple ── */
  @keyframes rippleOut {
    from { transform: scale(0.8); opacity: 0.5; }
    to   { transform: scale(2.2); opacity: 0; }
  }
  .ripple {
    position: absolute; inset: 0; border-radius: 50%;
    border: 1.5px solid var(--blue);
    animation: rippleOut 1.4s ease-out infinite;
    pointer-events: none;
  }
  .ripple.r2 { animation-delay: 0.5s; }
  .scanning .ripple { display: block; }
  .ripple { display: none; }
</style>
</head>
<body>

<!-- Atmospheric BG -->
<div class="bg-layer">
  <div class="bg-orb a"></div>
  <div class="bg-orb b"></div>
  <div class="bg-orb c"></div>
  <div class="bg-grid"></div>
  <div class="bg-noise"></div>
</div>

<!-- Card -->
<div class="card" id="card">

  <!-- Header -->
  <div class="header-row">
    <div class="logo-mark">
      <svg viewBox="0 0 20 20"><path d="M3 10 a7 7 0 1 1 14 0"/><path d="M10 3v2M10 15v2M3 10H1M19 10h-2"/></svg>
    </div>
    <div class="session-badge" id="sessionBadge">SESSION •••</div>
  </div>

  <!-- Fingerprint ring -->
  <div class="fp-ring-wrap">
    <div class="fp-ring" id="fpRing">
      <svg class="ring-svg" viewBox="0 0 120 120">
        <circle class="track" cx="60" cy="60" r="54"/>
        <circle class="progress" id="ringProgress" cx="60" cy="60" r="54"/>
      </svg>
      <!-- Ripple rings -->
      <div class="ripple"></div>
      <div class="ripple r2"></div>
      <!-- Scan line -->
      <div class="scan-line"></div>
      <!-- Icon -->
      <div class="fp-icon-btn" id="fpIcon">
        <!-- Fingerprint SVG (idle/scanning/error) -->
        <svg id="iconFp" viewBox="0 0 38 38" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 6C12 6 7 11.3 7 18c0 5.5 1.5 9 3.5 11.5"/>
          <path d="M19 6c7 0 12 5.3 12 12 0 6-2.5 10.5-5 13"/>
          <path d="M19 11c4.4 0 8 3.6 8 8 0 4-1.8 7.2-4 9.5"/>
          <path d="M19 11c-4.4 0-8 3.6-8 8 0 3.2 1 5.8 2.5 7.8"/>
          <path d="M19 16a3 3 0 0 1 3 3c0 2.5-1 4.5-2 5.8"/>
          <path d="M19 16a3 3 0 0 0-3 3c0 1.8.5 3.2 1.2 4.3"/>
        </svg>
        <!-- Success checkmark (hidden by default) -->
        <svg id="iconCheck" viewBox="0 0 38 38" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none; stroke:var(--green);">
          <circle cx="19" cy="19" r="11"/>
          <path class="check-path" d="M14 19.5 L17.5 23 L24 15.5"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Title & Sub -->
  <div class="card-title" id="cardTitle">Barmoq izi tasdiqlanishi kutilmoqda</div>
  <div class="card-sub" id="cardSub">Tasdiqlash uchun tugmani bosing</div>

  <!-- Status -->
  <div class="status-msg" id="statusMsg">Tayyor</div>

  <!-- Button -->
  <div class="btn-wrap">
    <button class="fp-btn" id="fpBtn" onclick="startBiometric()">
      <svg viewBox="0 0 20 20"><path d="M10 3C6.1 3 3 6.1 3 10s3.1 7 7 7 7-3.1 7-7-3.1-7-7-7z"/><path d="M10 6.5A3.5 3.5 0 0 1 13.5 10c0 1.9-.8 3.4-1.8 4.5"/><path d="M10 6.5A3.5 3.5 0 0 0 6.5 10c0 2.3 1 3.9 2 5"/></svg>
      Fingerprint boshlash
    </button>
  </div>

  <div class="divider"><span></span><label>XAVFSIZ ULANISH</label><span></span></div>

  <div class="info-row">
    <svg viewBox="0 0 20 20"><path d="M10 2 L4 5v5c0 4.4 2.6 8.5 6 10 3.4-1.5 6-5.6 6-10V5L10 2z"/></svg>
    256-bit shifrlash · WebAuthn FIDO2
  </div>

</div>

<script>
(function () {
  const $ = id => document.getElementById(id);

  const card = $('card');
  const fpRing = $('fpRing');
  const iconFp = $('iconFp');
  const iconCheck = $('iconCheck');
  const fpBtn = $('fpBtn');
  const statusMsg = $('statusMsg');
  const cardTitle = $('cardTitle');
  const cardSub = $('cardSub');
  const ringProg = $('ringProgress');
  const sessionBadge = $('sessionBadge');

  const pathParts = window.location.pathname.split('/');
  const SESSION_ID = pathParts[pathParts.length - 2] || pathParts[pathParts.length - 1];

  sessionBadge.textContent = 'ID ' + SESSION_ID.slice(-6).toUpperCase();

  const CIRCUMFERENCE = 2 * Math.PI * 54;
  ringProg.style.strokeDasharray = CIRCUMFERENCE;
  ringProg.style.strokeDashoffset = CIRCUMFERENCE;

  function setProgress(pct) {
    ringProg.style.strokeDashoffset = CIRCUMFERENCE * (1 - pct / 100);
  }

  let progressInterval = null;

  function animateProgress(from, to, duration, onDone) {
    clearInterval(progressInterval);

    const start = performance.now();
    const diff = to - from;

    progressInterval = setInterval(() => {
      const t = Math.min((performance.now() - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 3);

      setProgress(from + diff * ease);

      if (t >= 1) {
        clearInterval(progressInterval);
        if (onDone) onDone();
      }
    }, 16);
  }

  function setState(state, msg) {
    card.className = 'card ' + state;
    fpRing.className = 'fp-ring ' + state;

    statusMsg.className =
      'status-msg ' +
      (state === 'scanning'
        ? 'scanning'
        : state === 'success'
        ? 'ok'
        : state === 'error'
        ? 'err'
        : '');

    statusMsg.textContent = msg;
  }

  function showIdle() {
    iconFp.style.display = '';
    iconCheck.style.display = 'none';

    setState('', 'Tayyor');

    cardTitle.textContent = 'Barmoq izi tasdiqlanishi kutilmoqda';
    cardSub.textContent = 'Tasdiqlash uchun tugmani bosing';

    fpBtn.disabled = false;
    fpBtn.className = 'fp-btn';
    fpBtn.innerHTML = 'Fingerprint boshlash';

    setProgress(0);
  }

  function showScanning() {
    iconFp.style.display = '';
    iconCheck.style.display = 'none';

    setState('scanning', 'Skanerlash jarayonda…');

    cardTitle.textContent = 'Tasdiqlanmoqda';
    cardSub.textContent = 'Barmoq izini tasdiqlang';

    fpBtn.disabled = true;

    animateProgress(0, 80, 6000);
  }

  function showSuccess() {
    clearInterval(progressInterval);

    iconFp.style.display = 'none';
    iconCheck.style.display = '';

    setState('success', '✓ Muvaffaqiyatli tasdiqlandi');

    cardTitle.textContent = 'Tasdiqlash muvaffaqiyatli';
    cardSub.textContent = 'Session ochilmoqda...';

    fpBtn.disabled = true;
    fpBtn.className = 'fp-btn done';
    fpBtn.innerHTML = 'Tasdiqlandi';

    animateProgress(80, 100, 500);
  }

  function showError(msg) {
    clearInterval(progressInterval);

    iconFp.style.display = '';
    iconCheck.style.display = 'none';

    setState('error', msg || 'Tasdiqlanmadi');

    cardTitle.textContent = 'Tasdiqlash amalga oshmadi';
    cardSub.textContent = 'Qayta urinib ko‘ring';

    fpBtn.disabled = false;
    fpBtn.className = 'fp-btn';
    fpBtn.innerHTML = 'Qayta urinish';

    setProgress(0);
  }

  function base64ToUint8Array(base64) {
    const padding = '='.repeat((4 - base64.length % 4) % 4);
    const safe = (base64 + padding).replace(/-/g, '+').replace(/_/g, '/');
    const raw = atob(safe);
    return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
  }

  async function loadOptions() {
    const res = await fetch(`/api/agent/fingerprint/phone/submit/${SESSION_ID}/`);

    if (!res.ok) {
      throw new Error('Options olinmadi');
    }

    return await res.json();
  }

  async function postResult(credential) {
    const res = await fetch(`/api/agent/fingerprint/phone/submit/${SESSION_ID}/`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        credential_id: credential.id,
        rawId: btoa(String.fromCharCode(...new Uint8Array(credential.rawId))),
        clientDataJSON: btoa(String.fromCharCode(...new Uint8Array(credential.response.clientDataJSON))),
        authenticatorData: btoa(String.fromCharCode(...new Uint8Array(credential.response.authenticatorData))),
        signature: btoa(String.fromCharCode(...new Uint8Array(credential.response.signature)))
      })
    });

    if (!res.ok) {
      throw new Error('Backend verify xato');
    }

    return await res.json();
  }

  window.startBiometric = async function () {
    try {
      if (!window.PublicKeyCredential) {
        showError('Brauzer qo‘llab-quvvatlamaydi');
        return;
      }

      showScanning();

      const options = await loadOptions();

      const credential = await navigator.credentials.get({
        publicKey: {
          challenge: base64ToUint8Array(options.challenge),
          rpId: window.location.hostname,
          allowCredentials: [{
            id: base64ToUint8Array(options.credential_id),
            type: 'public-key'
          }],
          userVerification: 'required',
          timeout: 60000
        }
      });

      const result = await postResult(credential);

      if (result.status === 'completed') {
        showSuccess();
      } else {
        showError('Tasdiqlanmadi');
      }

    } catch (err) {
      console.error(err);
      showError(err.message);
    }
  };

  showIdle();
})();
</script>


</body>
</html>
